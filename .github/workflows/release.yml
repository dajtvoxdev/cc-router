name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare artifacts dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Publish self-contained (compressed)
        shell: pwsh
        run: |
          dotnet publish CCRouter.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o publish/selfcontained
          Copy-Item publish/selfcontained/CCRouter.exe artifacts/CCRouter.exe -Force

      - name: Clean obj/bin between publishes
        shell: pwsh
        run: Remove-Item bin, obj, publish -Recurse -Force -ErrorAction SilentlyContinue

      - name: Publish framework-dependent
        shell: pwsh
        run: |
          dotnet publish CCRouter.csproj -c Release -r win-x64 -p:SelfContained=false -p:PublishSingleFile=true -p:DebugType=none -p:DebugSymbols=false -o publish/fxdep
          Copy-Item publish/fxdep/CCRouter.exe artifacts/CCRouter-fxdep.exe -Force

      - name: Show artifact sizes
        shell: pwsh
        run: |
          Get-ChildItem artifacts | Format-Table Name, @{Name='SizeMB';Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          } else {
            $tag = '${{ github.event.inputs.tag }}'
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing tag: $tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CCRouter ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Downloads

            | File | Notes |
            |---|---|
            | **CCRouter.exe** | Self-contained — chạy ngay, không cần cài .NET runtime |
            | **CCRouter-fxdep.exe** | Cần cài [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) trước (file nhẹ hơn nhiều) |

            Tải file .exe → chạy trực tiếp. Lần đầu Windows SmartScreen có thể cảnh báo → click **More info** → **Run anyway**.

            Xem [README](https://github.com/${{ github.repository }}#readme) để biết cách dùng.
          files: |
            artifacts/CCRouter.exe
            artifacts/CCRouter-fxdep.exe
